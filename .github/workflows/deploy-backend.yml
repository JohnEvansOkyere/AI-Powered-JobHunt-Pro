# Deploys to the VeloxaHire DO Droplet on push to main, after tests pass.
# PR/push testing is already covered by ci.yml — this workflow only re-runs
# tests as a deploy gate on main, not on every PR, to avoid duplicate CI runs.
# Requires GitHub Secrets: DO_DEPLOY_SSH_KEY, DO_DEPLOY_HOST, DO_DEPLOY_USER
# See docs/deployment/DIGITALOCEAN_MIGRATION.md for setup.

name: Backend deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-secret
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_KEY: ci-anon-key
      SUPABASE_SERVICE_KEY: ci-service-key
      DATABASE_URL: postgresql://user:pass@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: development
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov pytest-mock "httpx<0.28"
      - name: Run tests
        # Integration tests need live DB/Redis/Supabase (not available in CI).
        run: python -m pytest -q -m "not integration"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for backend changes
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD | grep -qE '^backend/|^\.github/workflows/deploy-backend' \
            && echo "deploy=true" >> $GITHUB_OUTPUT \
            || echo "deploy=false" >> $GITHUB_OUTPUT
      - name: Deploy to Droplet via SSH
        if: steps.changes.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DEPLOY_HOST }}
          username: ${{ secrets.DO_DEPLOY_USER }}
          key: ${{ secrets.DO_DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/veloxahire && git pull
            cd backend && source venv/bin/activate && pip install -r requirements.txt
            systemctl restart veloxahire veloxahire-worker veloxahire-beat
            echo "Waiting for service to be healthy..."
            for i in $(seq 1 12); do
              sleep 5
              if curl --fail --silent --max-time 10 https://api.veloxahire.org/health; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Attempt $i/12 failed, retrying..."
            done
            echo "HEALTH CHECK FAILED after 60 seconds"
            exit 1
